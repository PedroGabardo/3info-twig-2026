{% extends "_base.html" %}

{% block conteudo %}
<h1>jogos_inserir dos guri</h1>

{% if erro %}
<p>{{ erro }}</p>
{% endif %}

<form action="jogos_inserir.php" method="post" enctype="multipart/form-data">
    nome :<input type="text" name="nome" placeholder="Insira nome">
    <br>
    estilo :<select name="estilo">
        <option value="acao">Ação</option>
        <option value="tiro">Tiro</option>
        <option value="rpg">RPG</option>
    </select>
    <br>
    capa: <input type="file" name="capa">
    <br>
    data de lançamento :<input type="date" name="lancamento" placeholder="insira data">
    <br>
    <input type="submit" value="gravar">

</form>
{% endblock %}
